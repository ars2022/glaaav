<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Arsendjer</title>
  <style>
    :root { --bg: #f0f2f5; --card: #fff; --primary: #0a7cff; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); height: 100dvh; display: flex; justify-content: center; align-items: center; }
    .app { width: 100%; max-width: 500px; height: 100vh; background: var(--card); display: flex; flex-direction: column; overflow: hidden; }
    .screen { display: none; flex-direction: column; height: 100%; padding: 16px; }
    .screen.active { display: flex; }
    input, button { font-size: 16px; padding: 12px; border-radius: 10px; border: 1px solid #d1d5db; width: 100%; margin-bottom: 8px; }
    button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
    button.secondary { background: #e5e7eb; color: #1f2937; }
    .msg { background: #e4e6eb; padding: 10px; border-radius: 12px; margin: 6px 0; max-width: 80%; word-break: break-word; }
    .msg.me { background: #0084ff; color: white; align-self: flex-end; }
    .chat-area { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
    .attach-btns { display: flex; gap: 6px; }
    .attach-btns button { flex: 1; padding: 10px; font-size: 14px; }
    .hidden { display: none !important; }
    .contacts-list { list-style: none; padding: 0; }
    .contact { padding: 12px; background: #f9fafb; margin: 6px 0; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; }
    .contact:hover { background: #eef2ff; }
    .recording { background: #ef4444 !important; color: white; }
    .btn-group { display: flex; gap: 10px; }
    .btn-group button { flex: 1; }
    .name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .name-row span { font-weight: 600; }
    .name-row button { width: auto; padding: 6px 12px; margin: 0; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/paho-mqtt@1.1.0/paho-mqtt.min.js"></script>
</head>
<body>
<div class="app" id="app">
  <!-- ЭКРАН ВХОДА / РЕГИСТРАЦИИ -->
  <div id="loginScreen" class="screen active">
    <h2>🔐 Arsendjer</h2>
    <p style="color:gray;">Создай новый аккаунт или войди</p>
    <input type="text" id="pubIdInput" placeholder="Публичный ID (твой код для связи)">
    <input type="password" id="secretInput" placeholder="Секретный ключ (пароль)">
    <input type="text" id="nameInput" placeholder="Твоё имя (как тебя увидят)">
    <div class="btn-group">
      <button id="registerBtn" class="secondary">✍️ Зарегистрироваться</button>
      <button id="loginBtn">🔑 Войти</button>
    </div>
    <div id="loginError" style="color:red;margin-top:8px;"></div>
    <small style="color:gray;margin-top:12px;">Публичный ID и ключ — твои вечные коды. Сохрани их!</small>
  </div>

  <!-- ГЛАВНЫЙ ЭКРАН (контакты) -->
  <div id="mainScreen" class="screen">
    <div class="name-row">
      <span>👤 <span id="currentNameDisplay"></span></span>
      <button id="changeNameBtn" class="secondary" style="font-size:14px;">✏️</button>
    </div>
    <h2>💬 Контакты</h2>
    <div style="display:flex; gap:6px;">
      <input type="text" id="addContactInput" placeholder="ID контакта">
      <button id="addContactBtn" style="width:auto;">➕</button>
    </div>
    <ul id="contactsList" class="contacts-list"></ul>
    <button id="logoutBtn" class="secondary" style="margin-top:auto;">🚪 Выйти</button>
  </div>

  <!-- ЭКРАН ЧАТА -->
  <div id="chatScreen" class="screen">
    <div style="display:flex; align-items:center; gap:10px;">
      <button id="backBtn" class="secondary" style="width:auto; padding:10px;">←</button>
      <strong id="chatTitle"></strong>
    </div>
    <div id="chatMessages" class="chat-area"></div>
    <div class="attach-btns">
      <button id="attachPhotoBtn">📷 Фото</button>
      <button id="attachVideoBtn">🎬 Видео</button>
      <button id="recordVoiceBtn" class="secondary">🎤 Голос</button>
    </div>
    <div style="display:flex; gap:6px;">
      <input type="text" id="messageInput" placeholder="Сообщение...">
      <button id="sendBtn" style="width:auto;">→</button>
    </div>
    <div id="recordingStatus" style="text-align:center;color:red;font-weight:bold;margin:5px;"></div>
  </div>
</div>

<script>
  // Убедимся, что DOM загружен
  window.addEventListener('DOMContentLoaded', function() {
    console.log('Страница Arsendjer загружена');

    // Проверка загрузки Paho
    if (typeof Paho === 'undefined') {
      alert('Ошибка: не загрузилась библиотека сообщений. Проверьте интернет или повторите позже.');
      return;
    }

    // ==================== MQTT ====================
    let client = null;
    let myPublicId = '';
    let mySecret = '';
    let myName = '';
    const BROKER = 'wss://test.mosquitto.org:8081/mqtt';

    function connectMQTT() {
      if (client && client.isConnected()) return;
      client = new Paho.MQTT.Client(BROKER, myPublicId + '_' + Math.random().toString(36).substr(2,8));
      client.onConnectionLost = () => {
        console.warn('MQTT потеряно, переподключение...');
        setTimeout(connectMQTT, 3000);
      };
      client.onMessageArrived = onMessage;
      client.connect({
        onSuccess: () => {
          client.subscribe('arsendjer/' + myPublicId);
          console.log('MQTT подключен');
        },
        onFailure: (err) => {
          console.error('MQTT ошибка', err.errorMessage);
          alert('Не удалось подключиться к серверу сообщений. Проверьте интернет.');
        }
      });
    }

    function onMessage(message) {
      try {
        const data = JSON.parse(message.payloadString);
        if (data.from === myPublicId) return;
        saveMessage(data.from, data);
        if (currentChatId === data.from) renderChat(data.from);
        updateContactList();
      } catch(e) {
        console.error('Ошибка обработки сообщения', e);
      }
    }

    function sendTo(contactId, payload) {
      const topic = 'arsendjer/' + contactId;
      const msg = new Paho.MQTT.Message(JSON.stringify(payload));
      msg.destinationName = topic;
      if (client && client.isConnected()) {
        client.send(msg);
      } else {
        alert('Нет соединения. Попробуйте позже.');
      }
      saveMessage(contactId, payload);
    }

    // ==================== Хранилище ====================
    function getHistory(contactId) {
      return JSON.parse(localStorage.getItem('chat_' + myPublicId + '_' + contactId) || '[]');
    }
    function saveMessage(contactId, msg) {
      msg.time = Date.now();
      const hist = getHistory(contactId);
      hist.push(msg);
      localStorage.setItem('chat_' + myPublicId + '_' + contactId, JSON.stringify(hist.slice(-200)));
      if (currentChatId === contactId) renderChat(contactId);
    }

    // ==================== Экраны ====================
    const loginScreen = document.getElementById('loginScreen');
    const mainScreen = document.getElementById('mainScreen');
    const chatScreen = document.getElementById('chatScreen');
    let currentChatId = null;

    function showMain() {
      loginScreen.classList.remove('active');
      mainScreen.classList.add('active');
      chatScreen.classList.remove('active');
      document.getElementById('currentNameDisplay').innerText = myName;
      updateContactList();
    }
    function showChat(contactId) {
      loginScreen.classList.remove('active');
      mainScreen.classList.remove('active');
      chatScreen.classList.add('active');
      currentChatId = contactId;
      document.getElementById('chatTitle').innerText = contactId;
      renderChat(contactId);
    }

    // ==================== Контакты ====================
    function getContacts() {
      return JSON.parse(localStorage.getItem('contacts_' + myPublicId) || '[]');
    }
    function addContact(id) {
      if (!id || id === myPublicId) return;
      const contacts = getContacts();
      if (!contacts.includes(id)) {
        contacts.push(id);
        localStorage.setItem('contacts_' + myPublicId, JSON.stringify(contacts));
      }
      updateContactList();
    }
    function updateContactList() {
      const list = document.getElementById('contactsList');
      const contacts = getContacts();
      list.innerHTML = '';
      contacts.forEach(id => {
        const li = document.createElement('li');
        li.className = 'contact';
        li.innerHTML = `<span>${id}</span>`;
        li.onclick = () => showChat(id);
        list.appendChild(li);
      });
    }

    // ==================== Чат ====================
    function renderChat(contactId) {
      const container = document.getElementById('chatMessages');
      const hist = getHistory(contactId);
      container.innerHTML = '';
      hist.forEach(msg => {
        const div = document.createElement('div');
        div.className = 'msg ' + (msg.from === myPublicId ? 'me' : '');
        let content = '';
        if (msg.type === 'file') {
          content = `<a href="${msg.url}" target="_blank">📎 ${msg.filename || 'Файл'}</a>`;
        } else if (msg.type === 'voice') {
          content = `<audio controls src="${msg.url}"></audio>`;
        } else {
          content = msg.text || '';
        }
        div.innerHTML = `
          <div style="font-weight:600;font-size:0.85em;">${msg.name || msg.from}</div>
          ${content}
          <div style="font-size:0.7em; color:gray; text-align:right;">${new Date(msg.time).toLocaleTimeString()}</div>
        `;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    }

    // ==================== Отправка файлов ====================
    function uploadToCatbox(file, callback) {
      const fd = new FormData();
      fd.append('reqtype', 'fileupload');
      fd.append('fileToUpload', file);
      const xhr = new XMLHttpRequest();
      xhr.open('POST', 'https://catbox.moe/user/api.php', true);
      xhr.onload = function() {
        if (xhr.status === 200 && xhr.responseText.startsWith('http')) {
          callback(null, xhr.responseText.trim());
        } else {
          callback(new Error(xhr.responseText));
        }
      };
      xhr.onerror = () => callback(new Error('Сеть недоступна'));
      xhr.send(fd);
    }

    function sendFileMessage(file) {
      if (!currentChatId) return;
      uploadToCatbox(file, (err, url) => {
        if (err) { alert('Ошибка загрузки: ' + err.message); return; }
        const payload = {
          from: myPublicId,
          name: myName,
          type: 'file',
          url: url,
          filename: file.name || 'file'
        };
        sendTo(currentChatId, payload);
      });
    }

    // ==================== Голосовые ====================
    let mediaRecorder = null;
    let audioChunks = [];
    document.getElementById('recordVoiceBtn').addEventListener('click', async () => {
      const btn = document.getElementById('recordVoiceBtn');
      const status = document.getElementById('recordingStatus');
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        btn.classList.remove('recording');
        status.innerText = '';
        return;
      }
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert('Ваш браузер не поддерживает запись голоса.');
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          const file = new File([blob], 'voice.webm', { type: 'audio/webm' });
          sendFileMessage(file);
          stream.getTracks().forEach(t => t.stop());
        };
        mediaRecorder.start();
        btn.classList.add('recording');
        status.innerText = '🔴 Запись... нажми ещё раз для отправки';
      } catch (e) {
        alert('Нет доступа к микрофону: ' + e.message);
      }
    });

    // ==================== Аутентификация ====================
    function authenticate() {
      alert('Кнопка нажата!');  // <-- тестовое оповещение
      const pub = document.getElementById('pubIdInput').value.trim();
      const sec = document.getElementById('secretInput').value.trim();
      const name = document.getElementById('nameInput').value.trim();
      if (!pub || !sec || !name) {
        document.getElementById('loginError').innerText = 'Заполни все поля';
        return;
      }
      if (pub.includes(' ')) {
        document.getElementById('loginError').innerText = 'ID не должен содержать пробелов';
        return;
      }
      myPublicId = pub;
      mySecret = sec;
      myName = name;
      connectMQTT();
      showMain();
      localStorage.setItem('ars_pub', myPublicId);
      localStorage.setItem('ars_name', myName);
      document.getElementById('loginError').innerText = '';
      // Очищаем поля
      document.getElementById('pubIdInput').value = '';
      document.getElementById('secretInput').value = '';
      document.getElementById('nameInput').value = '';
    }

    // Назначаем обработчики ТОЛЬКО после проверки, что кнопки существуют
    const regBtn = document.getElementById('registerBtn');
    const logBtn = document.getElementById('loginBtn');
    if (regBtn) {
      regBtn.addEventListener('click', authenticate);
      console.log('Кнопка "Зарегистрироваться" активирована');
    } else {
      console.error('Кнопка регистрации не найдена');
    }
    if (logBtn) {
      logBtn.addEventListener('click', authenticate);
      console.log('Кнопка "Войти" активирована');
    } else {
      console.error('Кнопка входа не найдена');
    }

    // Смена имени
    document.getElementById('changeNameBtn').addEventListener('click', () => {
      const newName = prompt('Введи новое имя:', myName);
      if (newName && newName.trim() !== '') {
        myName = newName.trim();
        localStorage.setItem('ars_name', myName);
        document.getElementById('currentNameDisplay').innerText = myName;
        alert('Имя обновлено!');
      }
    });

    // Остальные кнопки...
    document.getElementById('addContactBtn').addEventListener('click', () => {
      const id = document.getElementById('addContactInput').value.trim();
      if (id) addContact(id);
      document.getElementById('addContactInput').value = '';
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      if (client) client.disconnect();
      myPublicId = ''; mySecret = ''; myName = '';
      currentChatId = null;
      loginScreen.classList.add('active');
      mainScreen.classList.remove('active');
      chatScreen.classList.remove('active');
    });

    document.getElementById('backBtn').addEventListener('click', () => {
      currentChatId = null;
      chatScreen.classList.remove('active');
      mainScreen.classList.add('active');
    });

    document.getElementById('sendBtn').addEventListener('click', () => {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || !currentChatId) return;
      sendTo(currentChatId, { type: 'text', text: text });
      input.value = '';
    });

    document.getElementById('attachPhotoBtn').addEventListener('click', () => {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = 'image/*';
      inp.onchange = () => { if (inp.files[0]) sendFileMessage(inp.files[0]); };
      inp.click();
    });
    document.getElementById('attachVideoBtn').addEventListener('click', () => {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = 'video/*';
      inp.onchange = () => { if (inp.files[0]) sendFileMessage(inp.files[0]); };
      inp.click();
    });

    // Автозаполнение
    const savedPub = localStorage.getItem('ars_pub');
    const savedName = localStorage.getItem('ars_name');
    if (savedPub) {
      document.getElementById('pubIdInput').value = savedPub;
      document.getElementById('nameInput').value = savedName || '';
    }
  });
</script>
</body>
</html>
